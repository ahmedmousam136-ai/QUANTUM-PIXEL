<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Pixel | Digital Artisan Studio</title>
    <!-- Tailwind & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Noto+Serif+Bengali:wght@400..800&family=Noto+Serif+Devanagari:wght@400..700&family=Space+Grotesk:wght@400..700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --c-bg: #F5F2EB; --c-ink: #1A1816; --c-red: #B93B2B; --c-gold: #E2A624; --c-blue: #163240; }
        body { background-color: var(--c-bg); color: var(--c-ink); font-family: 'Lora', serif; margin: 0; overflow-x: hidden; }
        .font-bn { font-family: 'Noto Serif Bengali', serif; }
        .font-hi { font-family: 'Noto Serif Devanagari', serif; }
        .font-tech { font-family: 'Space Grotesk', sans-serif; }
        .shadow-h { box-shadow: 6px 6px 0px var(--c-ink); }
        .shadow-gold { box-shadow: 6px 6px 0px var(--c-gold); }
        .shadow-red { box-shadow: 6px 6px 0px var(--c-red); }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        .animate-marquee { display: flex; animation: scroll 30s linear infinite; }
        #sidebar { transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); }
        #sidebar.open { transform: translateX(0); }
    </style>
</head>
<body class="lang-en">

    <!-- Mobile Sidebar -->
    <div id="overlay" onclick="toggleMenu(false)" class="fixed inset-0 bg-black/60 z-[60] opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-sm"></div>
    <aside id="sidebar" class="fixed top-0 left-0 bottom-0 w-[85%] max-w-[320px] bg-[#F5F2EB] border-r-2 border-black z-[70] p-10 flex flex-col gap-10 shadow-[10px_0_0_var(--c-gold)]">
        <button onclick="toggleMenu(false)" class="self-end"><i data-lucide="x" class="w-8 h-8"></i></button>
        <div id="side-links" class="flex flex-col gap-6 text-2xl font-bold text-[#163240]"></div>
        <a href="#contact" onclick="toggleMenu(false)" class="mt-4 bg-[#B93B2B] text-white px-6 py-4 border-2 border-black shadow-h text-center font-bold" id="side-cta">Contact</a>
    </aside>

    <div class="max-w-[1400px] mx-auto border-x-2 border-black min-h-screen relative bg-[#F5F2EB]">
        
        <!-- Navigation -->
        <nav class="sticky top-0 z-50 flex items-center justify-between px-3 md:px-10 py-4 md:py-6 border-b-2 border-black bg-[#F5F2EB]">
            <div class="flex items-center gap-2 md:gap-4 shrink overflow-hidden">
                <button onclick="toggleMenu(true)" class="p-1 shrink-0"><i data-lucide="menu" class="w-7 h-7"></i></button>
                <div class="flex flex-col md:flex-row md:items-center gap-0.5 md:gap-3 truncate">
                    <a href="#" class="text-lg md:text-2xl font-bold flex gap-1 items-center shrink-0">
                        <span id="nav-logo">Quantum</span><span class="text-[#B93B2B] italic font-tech">Pixel</span>
                    </a>
                    <div class="bg-[#FFFBF0] border-[1.5px] border-[#B93B2B] px-1.5 md:px-3 py-0.5 text-[8px] md:text-xs font-tech font-bold text-[#B93B2B] uppercase truncate">
                        <span id="nav-msme"></span>
                    </div>
                </div>
            </div>

            <div class="flex border-2 border-black bg-white shadow-[2px_2px_0_var(--c-gold)] shrink-0 ml-1">
                <button onclick="setL('en')" id="b-en" class="px-2 md:px-4 py-1.5 text-[10px] md:text-sm font-bold border-r-2 border-black text-black">EN</button>
                <button onclick="setL('bn')" id="b-bn" class="px-2 md:px-4 py-1.5 text-[10px] md:text-sm font-bold border-r-2 border-black text-black">BN</button>
                <button onclick="setL('hi')" id="b-hi" class="px-2 md:px-4 py-1.5 text-[10px] md:text-sm font-bold text-black font-hi">HI</button>
            </div>
        </nav>

        <main>
            <!-- Hero -->
            <section class="grid lg:grid-cols-2 border-b-2 border-black">
                <div class="p-8 md:p-20 border-r-0 lg:border-r-2 border-black flex flex-col justify-center">
                    <div class="inline-flex items-center gap-2 px-3 py-1 border border-black/20 rounded-full bg-yellow-500/10 w-fit mb-6 text-[10px] font-bold font-tech text-black/60 uppercase">
                        Made in Bengal ৾ Crafted for the World
                    </div>
                    <h1 id="h-title" class="text-4xl md:text-7xl font-bold leading-[1.1] text-[#163240] mb-8"></h1>
                    <p id="h-desc" class="text-lg md:text-xl opacity-80 mb-10 max-w-md font-serif"></p>
                    <a href="#contact" id="h-cta" class="w-fit bg-[#B93B2B] text-white border-2 border-black px-8 py-4 text-lg font-bold shadow-h hover:-translate-y-1 transition-all"></a>
                </div>
                <div class="p-10 md:p-20 bg-[radial-gradient(#B93B2B_1px,transparent_1px)] bg-[length:25px_25px] flex items-center justify-center overflow-hidden">
                    <div class="relative w-full max-w-[320px] aspect-[4/5] bg-[#E2A624] border-2 border-black rounded-t-full shadow-h flex flex-col items-center justify-center p-10 text-center">
                        <div class="text-5xl md:text-6xl font-black text-[#163240]" id="card-art">ART</div>
                        <div class="text-6xl font-bold text-[#B93B2B] -my-4">+</div>
                        <div class="text-4xl md:text-5xl font-black text-[#163240]" id="card-tech">TECH</div>
                    </div>
                </div>
            </section>

            <!-- Marquee -->
            <div class="bg-black text-white py-6 overflow-hidden border-b-2 border-black">
                <div class="animate-marquee gap-10" id="marq-content"></div>
            </div>

            <!-- Philosophy -->
            <section id="philosophy" class="grid lg:grid-cols-2 border-b-2 border-black">
                <div class="p-8 lg:p-20 bg-[#E2A624] border-r-0 lg:border-r-2 border-black">
                    <span class="text-8xl text-[#B93B2B] font-tech leading-none -mb-6 block">❝</span>
                    <h2 class="text-3xl md:text-5xl font-bold text-[#163240] leading-tight" id="p-quote"></h2>
                </div>
                <div class="p-8 lg:p-20 bg-[#163240] text-white flex flex-col justify-center">
                    <h3 class="text-3xl font-bold text-[#E2A624] mb-8" id="p-title"></h3>
                    <p class="text-xl leading-relaxed opacity-90 font-serif" id="p-text"></p>
                </div>
            </section>

            <section id="services" class="p-8 md:p-20 border-b-2 border-black">
                <h2 class="text-4xl md:text-6xl font-bold mb-16 text-[#163240]" id="s-title"></h2>
                <div class="grid md:grid-cols-3 gap-8" id="s-grid"></div>
            </section>

            <section id="process" class="p-8 md:p-20 bg-[#FFFBF0] border-b-2 border-black">
                <h2 class="text-4xl font-bold text-center mb-16" id="proc-title"></h2>
                <div class="grid sm:grid-cols-4 gap-8" id="proc-grid"></div>
            </section>

            <section id="faq" class="p-8 md:p-20 border-b-2 border-black">
                <h2 class="text-4xl font-bold mb-12" id="f-title"></h2>
                <div class="max-w-3xl flex flex-col gap-4" id="f-container"></div>
            </section>
        </main>

        <footer class="py-16 px-8 border-t-2 border-black bg-[#163240] text-white text-center">
            <div class="text-3xl font-bold mb-4">Quantum <span class="text-[#E2A624] font-tech italic">Pixel</span></div>
            <p class="font-tech text-[10px] uppercase tracking-widest opacity-40">© 2026 THE DIGITAL ARTISANS OF BENGAL</p>
        </footer>
    </div>

    <script>
        const DATA = {
            en: {
                nav: { logo: "Quantum", msme: "A Govt. Registered MSME", about: "Philosophy", ser: "Services", pro: "Process", faq: "FAQ", con: "Contact" },
                hero: { title: "Digital Craft from Heritage Soil.", desc: "A web engineering studio born from the artistic legacy of West Bengal. We forge your business in the digital world.", cta: "Start Building", art: "ART", tech: "TECH" },
                marq: "DIGITAL RENAISSANCE OF BENGAL",
                phil: { quote: 'If technology is the canvas, design is our brushstroke.', title: 'Philosophy', text: "Inspired by West Bengal's heritage, we Manifest stories in the digital realm through artist sensitivity." },
                serv: { title: "Our Craftsmanship", items: [{ t: "Design", d: "Aesthetic interfaces inspired by Alpana." }, { t: "Engineering", d: "Infrastructure robust as the Howrah Bridge." }, { t: "Scale", d: "Global expansion strategies." }] },
                proc: { title: "Process", items: [{ t: "Discovery", d: "Understanding your goals." }, { t: "Milestones", d: "Zero-risk payment workflow." }, { t: "Secure Dev", d: "Flawless SSL coding." }, { t: "Launch", d: "100% ownership." }] },
                faq: { title: "FAQ", items: [{ q: "How long?", a: "2 to 4 weeks typically." }, { q: "Support?", a: "Continuous support provided." }] }
            },
            bn: {
                nav: { logo: "কোয়ান্টাম", msme: "সরকার নিবন্ধিত MSME", about: "দর্শন", ser: "পরিষেবাদি", pro: "প্রণালী", faq: "জিজ্ঞাস্য", con: "যোগাযোগ" },
                hero: { title: "ঐতিহ্যের মাটি থেকে ডিজিটাল শিল্প।", desc: "পশ্চিমবঙ্গের শিল্প ঐতিহ্যের বুক থেকে জন্ম নেওয়া এক ইঞ্জিনিয়ারিং স্টুডিও।", cta: "শুরু করুন", art: "শিল্প", tech: "প্রযুক্তি" },
                marq: "বাংলার ডিজিটাল নবজাগরণ",
                phil: { quote: 'প্রযুক্তি ক্যানভাস হলে, ডিজাইন হলো আমাদের তুলির আঁচড়।', title: 'আমাদের দর্শন', text: "বাংলার সাংস্কৃতিক ঐতিহ্য থেকে অনুপ্রেরণা নিয়ে আমরা হৃদয়স্পর্শী ওয়েবসাইট তৈরি করি।" },
                serv: { title: "আমাদের দক্ষতা", items: [{ t: "নকশা", d: "আলপনা অনুপ্রাণিত ইন্টারফেস।" }, { t: "প্রকৌশল", d: "হাওড়া ব্রিজের মতো শক্তিশালী পরিকাঠামো।" }, { t: "প্রসার", d: "বিশ্বমঞ্চে প্রসারের কৌশল।" }] },
                proc: { title: "নির্মাণ প্রণালী", items: [{ t: "অনুসন্ধান", d: "আপনার লক্ষ্য বোঝা।" }, { t: "মাইলফলক", d: "ঝুঁকিমুক্ত পেমেন্ট।" }, { t: "কোডিং", d: "SSL এনক্রিপশন।" }, { t: "উন্মোচন", d: "১০০% মালিকানা হস্তান্তর।" }] },
                faq: { title: "সচরাচর জিজ্ঞাস্য", items: [{ q: "কত সময় লাগে?", a: "সাধারণত ২ থেকে ৪ সপ্তাহ।" }, { q: "সহায়তা?", a: "পূর্ণ রক্ষণাবেক্ষণ সহায়তা প্রদান করি।" }] }
            },
            hi: {
                nav: { logo: "क्वांटम", msme: "सरकार पंजीकृत MSME", about: "दर्शन", ser: "सेवाएं", pro: "प्रक्रिया", faq: "प्रश्न", con: "संपर्क" },
                hero: { title: "विरासत की मिट्टी से डिजिटल कला।", desc: "पश्चिम बंगाल की कलात्मक विरासत के बीच पैदा हुआ एक वेब इंजीनियरिंग स्टूडियो।", cta: "शुरू करें", art: "कला", tech: "तकनीक" },
                marq: "बंगाल का डिजिटल पुनर्जागरण",
                phil: { quote: 'तकनीक यदि कैनवास है, तो डिज़ाइन हमारे ब्रश का स्पर्श है।', title: 'हमारा दर्शन', text: "पश्चिम बंगाल की सांस्कृतिक विरासत से प्रेरणा लेकर, हम ऐसी वेबसाइट बनाते हैं जो दिल छू ले।" },
                serv: { title: "हमारा शिल्प कौशल", items: [{ t: "रूपांकन", d: "अल्पना की तरह ही आकर्षक इंटरफेस।" }, { t: "इंजीनियरिंग", d: "हावड़ा ब्रिज की तरह मजबूत बुनियादी ढांचा।" }, { t: "विस्तार", d: "देश और विदेश तक फैलाने की रणनीति।" }] },
                proc: { title: "निर्माण प्रक्रिया", items: [{ t: "अनुसंधान", d: "जड़ों और लक्ष्यों को समझना।" }, { t: "माइलस्टोन", d: "जोखिम-मुक्त विकास।" }, { t: "सुरक्षित विकास", d: "SSL एन्क्रिप्शन का उपयोग।" }, { t: "लॉन्च", d: "दुनिया के सामने साइट लॉन्च।" }] },
                faq: { title: "सामान्य प्रश्न", items: [{ q: "कितना समय?", a: "आमतौर पर 2 से 4 सप्ताह।" }, { q: "सहायता?", a: "पूर्ण रखरखाव सहायता।" }] }
            }
        };

        function toggleMenu(s) {
            document.getElementById('sidebar').classList.toggle('open', s);
            document.getElementById('overlay').classList.toggle('opacity-100', s);
            document.getElementById('overlay').classList.toggle('pointer-events-auto', s);
        }

        function setL(lang) {
            const d = DATA[lang];
            document.body.className = `lang-${lang} ` + (lang === 'bn' ? 'font-bn' : lang === 'hi' ? 'font-hi' : 'font-serif');
            
            // Buttons
            ['en', 'bn', 'hi'].forEach(l => {
                const b = document.getElementById('b-'+l);
                b.className = `px-2 md:px-4 py-1.5 text-[10px] md:text-sm font-bold border-r-2 last:border-r-0 border-black ${l===lang ? 'bg-black text-white' : 'bg-transparent text-black'}`;
            });

            // Logo & Header
            document.getElementById('nav-logo').innerText = d.nav.logo;
            document.getElementById('nav-msme').innerText = `(${d.nav.msme})`;
            
            // Links
            const ks = ['about', 'ser', 'pro', 'faq', 'con'];
            const ids = ['philosophy', 'services', 'process', 'faq', 'contact'];
            document.getElementById('side-links').innerHTML = ks.map((k, i) => `<a href="#${ids[i]}" onclick="toggleMenu(false)" class="hover:text-[#B93B2B] hover:translate-x-2 transition-all">${d.nav[k]}</a>`).join('');
            document.getElementById('side-cta').innerText = d.nav.con;

            // Content
            document.getElementById('h-title').innerText = d.hero.title;
            document.getElementById('h-desc').innerText = d.hero.desc;
            document.getElementById('h-cta').innerText = d.hero.cta;
            document.getElementById('card-art').innerText = d.hero.art;
            document.getElementById('card-tech').innerText = d.hero.tech;

            // Marquee
            document.getElementById('marq-content').innerHTML = `<div class="flex gap-10 whitespace-nowrap">${[...Array(6)].map(() => `<div class="flex items-center gap-10 text-xl font-tech uppercase font-bold"><span>${d.marq}</span><span class="text-[#E2A624]">✽</span></div>`).join('')}</div>`;

            // Sections
            document.getElementById('p-quote').innerText = d.phil.quote;
            document.getElementById('p-title').innerText = d.phil.title;
            document.getElementById('p-text').innerText = d.phil.text;

            document.getElementById('s-title').innerText = d.serv.title;
            document.getElementById('s-grid').innerHTML = d.serv.items.map(it => `<div class="p-8 border-2 border-black bg-white shadow-h hover:shadow-red transition-all cursor-default"><h3 class="text-2xl font-bold mb-4 font-tech uppercase">${it.t}</h3><p class="opacity-80">${it.d}</p></div>`).join('');

            document.getElementById('proc-title').innerText = d.proc.title;
            document.getElementById('proc-grid').innerHTML = d.proc.items.map((it, i) => `<div class="p-8 border-2 border-black bg-white shadow-gold hover:-translate-y-2 transition-transform"><div class="text-4xl font-bold text-[#B93B2B]/30 mb-4 font-tech">0${i+1}</div><h3 class="text-xl font-bold mb-2">${it.t}</h3><p class="text-sm opacity-70">${it.d}</p></div>`).join('');

            document.getElementById('f-title').innerText = d.faq.title;
            document.getElementById('f-container').innerHTML = d.faq.items.map(it => `<details class="group border-2 border-black p-6 bg-[#FFFBF0] open:bg-[#E2A624] transition-all cursor-pointer"><summary class="flex justify-between font-bold text-xl list-none"><span>${it.q}</span><span>+</span></summary><div class="mt-4 pt-4 border-t border-black opacity-80">${it.a}</div></details>`).join('');

            lucide.createIcons();
        }
        setL('en');
    </script>
</body>
</html>
