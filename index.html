        .font-bengali { font-family: 'Noto Serif Bengali', serif; }
        .font-hindi { font-family: 'Noto Serif Devanagari', serif; }
        .shadow-heritage { box-shadow: 6px 6px 0px var(--color-ink); }
        .shadow-mustard { box-shadow: 6px 6px 0px var(--color-mustard); }
        .shadow-terracotta { box-shadow: 6px 6px 0px var(--color-terracotta); }
        .shadow-doubled { box-shadow: 8px 8px 0px var(--color-mustard), 8px 8px 0px 2px var(--color-ink); }

        .bg-dots { background-image: radial-gradient(var(--color-terracotta) 1px, transparent 1px); background-size: 25px 25px; }

        body.lang-bn .font-bengali-only { display: block; }
        body.lang-hi .font-hindi-only { display: block; }

                trst: { title: 'क्यों भरोसा करें?', items: [{ t: 'सत्यापित', d: 'सरकार पंजीकृत MSME और GSTIN।' }, { t: 'सुरक्षित', d: 'SSL एन्क्रिप्शन सुरक्षा।' }, { t: 'शून्य-जोखিম', d: 'मंजूरी के बाद भुगतान।' }, { t: 'स्वामित्व', d: '100% कोड स्वामित्व।' }] },
                faq: { title: 'प्रश्न', items: [{ q: 'कितना समय?', a: '2 से 4 सप्ताह।' }, { q: 'सहायता?', a: 'पूर्ण रखरखाव सहायता।' }] },
                cont: { title: 'संपर्क करें', sub: 'हमें संदेश भेजें।', msme: 'सरकार पंजीकृत MSME', gst: 'जीएसटीआईएन', labels: { name: 'नाम', email: 'ईमेल', msg: 'संदेश', sub: 'भेजें' } }
            }
        };

        let currentLang = 'en';

        function toggleMenu(open) {
            document.getElementById('sidebar').classList.toggle('open', open);
            document.getElementById('overlay').classList.toggle('opacity-100', open);
            document.getElementById('overlay').classList.toggle('pointer-events-auto', open);
        }

        function setLang(lang) {
            currentLang = lang;
            document.body.className = `lang-${lang} selection:bg-[#B93B2B] selection:text-[#F5F2EB] ` + (lang === 'bn' ? 'font-bengali' : lang === 'hi' ? 'font-hindi' : 'font-serif');
            
            // Highlight Buttons
            ['en', 'bn', 'hi'].forEach(l => {
                const btn = document.getElementById(`btn-${l}`);
                btn.className = `px-2.5 sm:px-4 py-1.5 sm:py-2 text-[10px] sm:text-sm font-bold border-r-2 last:border-r-0 border-[#1A1816] ${l === lang ? 'bg-[#1A1816] text-white' : 'bg-transparent text-[#1A1816]'}`;
            });

            renderContent();
        }

        function renderContent() {
            const data = TRANSLATIONS[currentLang];
            
            // Nav
            document.getElementById('nav-brand-main').innerText = data.nav.logo;
            document.getElementById('nav-msme-badge').innerText = `(${data.cont.msme})`;
            
            // Links & Sidebar
            const linkKeys = ['philosophy', 'services', 'portfolio', 'process', 'tech', 'trust', 'faq'];
            const sidebarLinks = document.getElementById('nav-links');
            sidebarLinks.innerHTML = linkKeys.map(k => `<a href="#${k}" onclick="toggleMenu(false)" class="hover:text-[#B93B2B] hover:translate-x-2 transition-all">${data.nav[k]}</a>`).join('');
            document.getElementById('side-contact-btn').innerText = data.nav.contact;

            // Hero
            document.getElementById('hero-badge').innerText = data.hero.badge;
            document.getElementById('hero-title').innerText = data.hero.title;
            document.getElementById('hero-desc').innerText = data.hero.description;
            document.getElementById('hero-cta').innerText = data.hero.cta;
            document.getElementById('card-art').innerText = data.hero.art;
            document.getElementById('card-tech').innerText = data.hero.tech;
            document.getElementById('card-sub').innerText = data.hero.sub;

            // Marquee
            document.getElementById('marquee-container').innerHTML = `<div class="flex gap-10 whitespace-nowrap">${[...Array(6)].map(() => `<div class="flex items-center gap-10 text-lg sm:text-xl font-tech font-bold uppercase tracking-wider"><span>${data.marquee}</span><span class="text-[#E2A624]">✽</span></div>`).join('')}</div>`;

            // Phil
            document.getElementById('philosophy-quote').innerText = data.phil.quote;
            document.getElementById('philosophy-title').innerText = data.phil.title;
            document.getElementById('philosophy-text').innerText = data.phil.text;

            // Grids
            document.getElementById('services-title').innerText = data.serv.title;
            document.getElementById('services-grid').innerHTML = data.serv.items.map((it, i) => `
                <div class="flex flex-col border-2 border-[#1A1816] bg-white shadow-heritage hover:shadow-terracotta translate-y-0 transition-all hover:-translate-y-1 p-10">
                    <h3 class="text-3xl font-bold mb-4">${it.t}</h3>
                    <p class="text-lg opacity-80">${it.d}</p>
                    <div class="mt-Auto pt-6 font-tech text-xs font-bold uppercase tracking-widest">${it.tag}</div>
                </div>`).join('');

            document.getElementById('portfolio-title').innerText = data.port.title;
            document.getElementById('portfolio-grid').innerHTML = data.port.items.map(it => `
                <div class="border-2 border-white p-6 hover:bg-white hover:text-black transition-all">
                    <div class="aspect-video bg-[#163240] border-2 border-white mb-6 flex items-center justify-center font-tech font-bold text-white">${it.tag}</div>
                    <h3 class="text-2xl font-bold mb-3">${it.t}</h3>
                    <p class="opacity-70">${it.d}</p>
                </div>`).join('');

            document.getElementById('process-title').innerText = data.proc.title;
            document.getElementById('process-grid').innerHTML = data.proc.steps.map((s, i) => `
                <div class="p-8 border-2 border-[#1A1816] bg-[#FFFBF0] shadow-mustard hover:shadow-terracotta transition-all">
                    <span class="text-5xl font-bold text-[#B93B2B]/30 mb-6 block">০${i+1}</span>
                    <h3 class="text-xl font-bold mb-4">${s.t}</h3>
                    <p class="opacity-80">${s.d}</p>
                </div>`).join('');

            document.getElementById('trust-title').innerText = data.trst.title;
            document.getElementById('trust-grid').innerHTML = data.trst.items.map((it, i) => `
                <div class="p-8 border-2 border-[#1A1816] bg-white shadow-mustard hover:shadow-terracotta transition-all">
                    <div class="text-3xl font-bold text-[#B93B2B] mb-5 border-b-4 border-[#163240] inline-block font-tech">0${i+1}</div>
                    <h3 class="text-xl font-bold mb-3">${it.t}</h3>
                    <p class="opacity-70">${it.d}</p>
                </div>`).join('');

            // FAQ
            document.getElementById('faq-title').innerText = data.faq.title;
            document.getElementById('faq-container').innerHTML = data.faq.items.map(it => `
                <details class="group border-2 border-[#1A1816] p-6 bg-[#FFFBF0] open:bg-[#E2A624] transition-all cursor-pointer">
                    <summary class="flex justify-between font-bold text-xl list-none"><span>${it.q}</span><span>+</span></summary>
                    <div class="mt-4 pt-4 border-t border-[#1A1816] opacity-90">${it.a}</div>
                </details>`).join('');

            // Contact
            document.getElementById('contact-title').innerText = data.cont.title;
            document.getElementById('contact-subtitle').innerText = data.cont.sub;
            document.getElementById('contact-certs').innerHTML = `
                <div class="flex-1 p-6 border-2 border-[#1A1816] bg-white shadow-terracotta flex items-center gap-4">
                    <div><span class="block text-[10px] font-tech font-bold uppercase mb-1">${data.cont.msme}</span><span class="font-bold">UDYAM-WB-18-0186128</span></div>
                </div>
                <div class="flex-1 p-6 border-2 border-[#1A1816] bg-white shadow-heritage flex items-center gap-4">
                    <div><span class="block text-[10px] font-tech font-bold uppercase mb-1">${data.cont.gst}</span><span class="font-bold">19BDYPL9210K1ZR</span></div>
                </div>`;
            document.getElementById('contact-form-inputs').innerHTML = `
                <div class="flex flex-col gap-2"><label class="font-tech text-xs uppercase font-bold text-[#163240]">${data.cont.labels.name}</label><input required class="bg-transparent border-2 border-[#1A1816] p-4 outline-none focus:bg-white" /></div>
                <div class="flex flex-col gap-2"><label class="font-tech text-xs uppercase font-bold text-[#163240]">${data.cont.labels.email}</label><input required type="email" class="bg-transparent border-2 border-[#1A1816] p-4 outline-none focus:bg-white" /></div>`;
            document.getElementById('label-message').innerText = data.cont.labels.msg;
            document.getElementById('btn-submit-text').innerText = data.cont.labels.sub;
            
            // Footer
            document.getElementById('footer-logo').innerHTML = `<span>${data.nav.logo}</span><span class="text-[#E2A624] font-tech ml-2">Pixel</span>`;
            
            // Refresh Icons
            lucide.createIcons();
        }

        // Initial render
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('shadow-md', window.scrollY > 20);
        });
        setLang('en');
    </script>

    <!-- WhatsApp Float -->
    <a href="https://wa.me/911234567890" target="_blank" class="fixed bottom-8 right-8 w-16 h-16 bg-[#25D366] text-white rounded-full flex items-center justify-center border-2 border-black shadow-heritage z-[100] hover:-translate-y-2 transition-all">
        <i data-lucide="message-circle" class="w-9 h-9"></i>
    </a>
</body>
</html>
